name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  domain-tests:
    name: Domain Unit Tests — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install PHPUnit
        run: composer require --dev phpunit/phpunit:^11.0 --no-interaction --no-progress

      - name: Run Domain Unit Tests (no database required)
        run: |
          php vendor/bin/phpunit tests/Unit/ \
            --no-configuration \
            --bootstrap vendor/autoload.php \
            --testdox

  syntax-check:
    name: PHP syntax check — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Check PHP syntax (all files)
        run: |
          find app tests -name "*.php" \
            -exec php -l {} \; \
            | grep -v "No syntax errors" \
            && echo "Syntax errors found!" && exit 1 \
            || echo "All PHP files OK"
